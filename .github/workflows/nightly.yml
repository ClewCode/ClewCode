name: Nightly

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: latest

jobs:
  test:
    name: Test (${{ matrix.os }})
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright browsers
        if: runner.os != 'macos-latest'
        run: npx playwright install chromium --with-deps

      - name: Check formatting
        run: bun run format:check

      - name: Check lint
        run: bun run lint:check

      - name: Type check
        run: |
          set +e
          bun x tsc --noEmit 2>tsc-output.txt
          count=$(grep -c "error TS" tsc-output.txt || true)
          baseline=$(cat .ts-error-baseline)
          echo "Found $count TypeScript errors (baseline: $baseline)"
          if [ "$count" -gt "$baseline" ]; then
            echo "FAIL: $count errors exceeds baseline $baseline"
            exit 1
          fi

      - name: Run tests
        run: bun test --bail
        timeout-minutes: 10

      - name: Build
        run: bun run build

      - name: Verify build output
        shell: bash
        run: |
          test -d dist
          test -s dist/main.js

      - name: Upload build output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-build-${{ matrix.os }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: Coverage
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ubuntu-latest-bun-

      - name: Install dependencies
        run: bun ci

      - name: Run coverage
        run: bun test --coverage --bail

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 30

  audit:
    name: Dependency Audit
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ubuntu-latest-bun-

      - name: Install dependencies
        run: bun ci

      - name: Run dependency audit
        run: bun audit

  package:
    name: Package Check
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs:
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ubuntu-latest-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ubuntu-latest-bun-

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: bun run build

      - name: Verify npm package contents
        run: npm pack --dry-run
